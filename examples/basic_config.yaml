# Basic TmuxAgentOrchestrator configuration
# ==========================================
# This example sets up two workers:
#   - worker-1: a Claude Code agent (drives the `claude` CLI in a tmux pane)
#   - worker-2: a custom echo agent (echoes task payloads back as results)
#
# P2P messaging is enabled between worker-1 and worker-2.

session_name: orchestrator
mailbox_dir: ~/.tmux_orchestrator

agents:
  - id: worker-1
    type: claude_code
    # command defaults to "claude --no-pager" inside ClaudeCodeAgent

  - id: worker-2
    type: custom
    command: "python3 -u examples/echo_agent.py"

p2p_permissions:
  - [worker-1, worker-2]   # bidirectional P2P allowed

task_timeout: 120
