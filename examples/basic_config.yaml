# Basic TmuxAgentOrchestrator configuration
# ==========================================
# Two Claude Code workers with P2P messaging enabled.
# Either worker can spawn the other as a sub-agent via CONTROL messages.

session_name: orchestrator
mailbox_dir: ~/.tmux_orchestrator

agents:
  - id: worker-1
    type: claude_code

  - id: worker-2
    type: claude_code
    isolate: false  # shares the main repo working tree (opt-out demo)

p2p_permissions:
  - [worker-1, worker-2]   # bidirectional P2P allowed

task_timeout: 120
