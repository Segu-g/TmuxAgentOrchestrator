# Debate Workflow Template
# =========================
# 3-role multi-round Advocate / Critic / Judge debate workflow.
#
# Pipeline (per round):
#   advocate_r{n} → critic_r{n}  (parallel within round)
# Final:
#   judge → DECISION.md
#
# Scratchpad keys (written by agents):
#   {scratchpad_prefix}_r{n}_advocate  — advocate's argument for round n
#   {scratchpad_prefix}_r{n}_critic    — critic's rebuttal for round n
#   {scratchpad_prefix}_decision       — judge's final DECISION.md
#
# Endpoint: POST /workflows/debate
# Reference: Du et al. ICML 2024 arXiv:2305.14325; DEBATE ACL 2024 arXiv:2405.09935

workflow:
  endpoint: /workflows/debate

# --- Defaults (parameter inheritance) ---
# Values in this section apply when the corresponding field is absent from the
# request body.  Override any field by setting it explicitly below or in the
# POST body.  Use apply_workflow_defaults() / load_workflow_template() from
# tmux_orchestrator.workflow_defaults to load this template programmatically.
defaults:
  max_rounds: 2
  advocate_tags: []
  critic_tags: []
  judge_tags: []
  reply_to: null

# --- Required fields ---

# Topic or design question to debate (e.g. "REST vs GraphQL for this API")
topic: "Should we use REST or GraphQL for the public API?"

# --- Optional fields ---

# Number of debate rounds (1-3)
max_rounds: 2

# Agent capability routing (empty = any available agent)
advocate_tags: []
critic_tags: []
judge_tags: []

# If set, the judge's RESULT is delivered to this agent's mailbox
reply_to: null

# --- Curl example ---
# curl -s -X POST http://localhost:8000/workflows/debate \
#   -H "Content-Type: application/json" \
#   -H "X-API-Key: $TMUX_ORCHESTRATOR_API_KEY" \
#   -d '{
#     "topic": "Should we use REST or GraphQL for the public API?",
#     "max_rounds": 2
#   }'
