# TDD Workflow Template
# =====================
# 3-agent Red→Green→Refactor pipeline.
#
# Pipeline:
#   test-writer → implementer → refactorer
#
# Scratchpad keys (written by agents):
#   {scratchpad_prefix}/tests_path  — path to the test file
#   {scratchpad_prefix}/impl_path   — path to the implementation file
#
# Endpoint: POST /workflows/tdd
# Reference: TDFlow arXiv:2510.23761 (2025); alexop.dev "Forcing Claude Code to TDD" (2025)

workflow:
  endpoint: /workflows/tdd

# --- Defaults (parameter inheritance) ---
# Values in this section apply when the corresponding field is absent from the
# request body.  Override any field by setting it explicitly below or in the
# POST body.  The 'defaults' key itself is stripped before schema validation.
# Use apply_workflow_defaults() / load_workflow_template() from
# tmux_orchestrator.workflow_defaults to load this template programmatically.
defaults:
  language: python
  test_writer_tags: []
  implementer_tags: []
  refactorer_tags: []
  reply_to: null

# --- Required fields ---

# Feature description (e.g. "a stack data structure with push/pop/peek")
feature: "a stack data structure with push, pop, and peek operations"

# --- Optional fields ---

# Programming language for the implementation
language: python

# Agent capability routing (empty = any available agent)
# Role-specific docs are loaded from agent_plugin/docs/ when agents are configured
# with a matching role field:
#   test-writer agent  → role: tester   → loads agent_plugin/docs/tester.md
#   implementer agent  → role: coder    → loads agent_plugin/docs/coder.md
#   refactorer agent   → role: reviewer → loads agent_plugin/docs/reviewer.md
#
# Example agent config entries (add to your orchestrator YAML):
#   agents:
#     - id: test-writer
#       role: tester
#       tags: [tdd_tester]
#     - id: implementer
#       role: coder
#       tags: [tdd_coder]
#     - id: refactorer
#       role: reviewer
#       tags: [tdd_reviewer]
test_writer_tags: []
implementer_tags: []
refactorer_tags: []

# If set, the refactorer's RESULT is delivered to this agent's mailbox
reply_to: null

# --- Curl example ---
# curl -s -X POST http://localhost:8000/workflows/tdd \
#   -H "Content-Type: application/json" \
#   -H "X-API-Key: $TMUX_ORCHESTRATOR_API_KEY" \
#   -d '{
#     "feature": "a stack data structure with push, pop, and peek operations",
#     "language": "python"
#   }'
